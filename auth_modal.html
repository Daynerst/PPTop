<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUN WEAR — Магазин одежды</title>
    <link href="auth_modal.css" rel="stylesheet">

<base target="_blank">
</head>
    <div class="modal-overlay" id="auth-modal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h2 id="auth-title">Вход</h2>
                <button class="modal-close" onclick="modals.close('auth-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="auth.setTab('login')">Вход</button>
                    <button class="auth-tab" onclick="auth.setTab('register')">Регистрация</button>
                </div>
                <div id="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="auth-email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="auth-password" placeholder="••••••••">
                    </div>
                    <div class="form-group" id="auth-name-group" style="display:none;">
                        <label>Имя</label>
                        <input type="text" id="auth-name" placeholder="Ваше имя">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="auth.submit()" id="auth-btn">Войти</button>
            </div>
        </div>
    </div>
</body>
</html>
